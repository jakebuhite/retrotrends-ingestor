name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check ingestion/ tests/

      - name: Check formatting (ruff)
        run: ruff format --check ingestion/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t retrotrends-ingestor:ci .
